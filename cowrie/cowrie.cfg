# Honeywatch - Cowrie SSH Honeypot Configuration
# Mimics CentOS Stream 10 with OpenSSH 9.8

[honeypot]
hostname = centos-hel1
log_path = var/log/cowrie
download_path = ${honeypot:state_path}/downloads
share_path = share/cowrie
state_path = var/lib/cowrie
etc_path = etc

# CentOS Stream 10 kernel
kernel_version = 6.12.8-200.el10.x86_64
kernel_build_string = #1 SMP PREEMPT_DYNAMIC Thu Jan  2 15:11:02 UTC 2025
hardware_platform = x86_64
operating_system = GNU/Linux

# Timezone (Helsinki - Hetzner)
timezone = Europe/Helsinki

[ssh]
enabled = true
listen_endpoints = tcp:2222:interface=0.0.0.0

# Match CentOS Stream 10 OpenSSH version
version = SSH-2.0-OpenSSH_9.8

# Auth delay to mimic PAM pam_faildelay (seconds)
auth_delay = 0.5
auth_delay_jitter = 1.5

[telnet]
enabled = false

[output_jsonlog]
enabled = true
logfile = ${honeypot:log_path}/cowrie.json

[output_textlog]
enabled = true
logfile = ${honeypot:log_path}/cowrie.log
