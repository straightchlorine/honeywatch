version: 2

updates:
  - package-ecosystem: pip
    directory: /api
    schedule:
      interval: weekly
      day: monday
    labels:
      - dependencies
    open-pull-requests-limit: 5

  - package-ecosystem: pip
    directory: /ingestor
    schedule:
      interval: weekly
      day: monday
    labels:
      - dependencies
    open-pull-requests-limit: 5

  - package-ecosystem: npm
    directory: /dashboard
    schedule:
      interval: weekly
      day: monday
    labels:
      - dependencies
    open-pull-requests-limit: 10

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    labels:
      - ci
    open-pull-requests-limit: 5

  - package-ecosystem: docker
    directory: /api
    schedule:
      interval: weekly
      day: monday
    labels:
      - docker
    open-pull-requests-limit: 5

  - package-ecosystem: docker
    directory: /ingestor
    schedule:
      interval: weekly
      day: monday
    labels:
      - docker
    open-pull-requests-limit: 5

  - package-ecosystem: docker
    directory: /dashboard
    schedule:
      interval: weekly
      day: monday
    labels:
      - docker
    open-pull-requests-limit: 5
