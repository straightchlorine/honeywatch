name: Release

on:
  push:
    tags: ["v*.*.*"]

concurrency:
  group: release
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository }}

permissions:
  contents: write
  packages: write

jobs:
  verify-tag:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Verify tag is on master
        env:
          TAG_REF: ${{ github.ref }}
        run: |
          git fetch origin master
          TAG_COMMIT=$(git rev-list -n 1 "$TAG_REF")
          if git branch -r --contains "$TAG_COMMIT" | grep -q "origin/master"; then
            echo "Tag is on master"
          else
            echo "Tag is NOT on master"
            exit 1
          fi

  build-and-push:
    needs: [verify-tag]
    runs-on: ubuntu-latest
    strategy:
      matrix:
        component: [api, ingestor, dashboard]
    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log into GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.IMAGE_PREFIX }}/${{ matrix.component }}
          tags: |
            type=semver,pattern={{version}}
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: ./${{ matrix.component }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: [build-and-push]
    runs-on: ubuntu-latest
    environment:
      name: production
    steps:
      - name: Deploy to VPS
        env:
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_KEY: ${{ secrets.SSH_KEY }}
          SSH_HOST_KEY: ${{ secrets.SSH_HOST_KEY }}
          PROXY_HOST: ${{ secrets.PROXY_HOST }}
          PROXY_PORT: ${{ secrets.PROXY_PORT }}
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
        run: |
          install -m 600 /dev/null ~/.ssh_deploy_key
          printf '%s\n' "$SSH_KEY" > ~/.ssh_deploy_key
          mkdir -p ~/.ssh && printf '%s\n' "$SSH_HOST_KEY" > ~/.ssh/known_hosts
          ssh -i ~/.ssh_deploy_key -o StrictHostKeyChecking=yes \
            -o "ProxyCommand=ssh -i ~/.ssh_deploy_key -o StrictHostKeyChecking=yes -W %h:%p -p ${PROXY_PORT} ${SSH_USER}@${PROXY_HOST}" \
            "${SSH_USER}@${DEPLOY_HOST}" \
            'cd /opt/honeywatch && git pull origin master && docker compose pull && docker compose up -d --remove-orphans'

  release:
    needs: [deploy]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Create GitHub Release
        run: gh release create ${{ github.ref_name }} --generate-notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
