worker_processes auto;
error_log /dev/stderr warn;
pid /run/nginx.pid;

events {
    worker_connections 128;
}

http {
    access_log /dev/stdout combined;

    # Docker DNS resolver
    resolver 127.0.0.11 valid=10s ipv6=off;

    # Security defaults
    server_tokens off;
    client_max_body_size 1m;
    proxy_connect_timeout 10s;
    proxy_read_timeout 30s;
    proxy_send_timeout 10s;

    # Rate limiting
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;
    limit_req_zone $binary_remote_addr zone=dashboard:10m rate=60r/s;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    server {
        listen 5000;
        limit_req zone=api burst=10 nodelay;

        location / {
            set $upstream_api http://api:5000;
            proxy_pass $upstream_api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }

    server {
        listen 8080;
        limit_req zone=dashboard burst=20 nodelay;

        location / {
            set $upstream_dashboard http://dashboard:80;
            proxy_pass $upstream_dashboard;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }

    server {
        listen 3000;
        limit_req zone=dashboard burst=20 nodelay;

        location / {
            set $upstream_grafana http://grafana:3000;
            proxy_pass $upstream_grafana;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }
}
