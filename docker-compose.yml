services:
  # -- Honeypot (isolated network - no access to backend services) --
  cowrie:
    image: cowrie/cowrie:latest
    container_name: honeywatch-cowrie
    restart: unless-stopped
    ports:
      - "2222:2222"
    volumes:
      - cowrie-logs:/cowrie/cowrie-git/var/log/cowrie
      - ./cowrie/cowrie.cfg:/cowrie/cowrie-git/etc/cowrie.cfg:ro
    networks:
      - honeypot
    read_only: true
    tmpfs:
      - /tmp
      - /cowrie/cowrie-git/var/lib/cowrie
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD-SHELL", "nc -z 127.0.0.1 2222 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3

  # -- Reverse proxy (only container with expose network access) --
  proxy:
    image: nginx:1.27-alpine
    container_name: honeywatch-proxy
    restart: unless-stopped
    ports:
      - "${WG_IP:-10.0.0.1}:5000:5000"
      - "${WG_IP:-10.0.0.1}:8080:8080"
      - "127.0.0.1:5000:5000"
      - "127.0.0.1:8080:8080"
      - "127.0.0.1:3000:3000"
    volumes:
      - ./proxy/nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - backend
      - expose
    read_only: true
    tmpfs:
      - /tmp
      - /var/cache/nginx
      - /run
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
      - CHOWN
      - SETGID
      - SETUID
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.25"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # -- Backend services (internal only - no internet access) --
  postgres:
    image: postgres:16-alpine
    container_name: honeywatch-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - backend
    cap_drop:
      - ALL
    cap_add:
      - DAC_OVERRIDE
      - FOWNER
      - SETGID
      - SETUID
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 3s
      retries: 5

  ingestor:
    image: ghcr.io/straightchlorine/honeywatch/ingestor:latest
    build: ./ingestor
    container_name: honeywatch-ingestor
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      cowrie:
        condition: service_healthy
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_HOST: postgres
    volumes:
      - cowrie-logs:/logs:ro
    networks:
      - backend
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.25"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  api:
    image: ghcr.io/straightchlorine/honeywatch/api:latest
    build: ./api
    container_name: honeywatch-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_HOST: postgres
      FLASK_SECRET_KEY: ${FLASK_SECRET_KEY}
      DASHBOARD_USER: ${DASHBOARD_USER}
      DASHBOARD_PASSWORD: ${DASHBOARD_PASSWORD}
      MAXMIND_LICENSE_KEY: ${MAXMIND_LICENSE_KEY}
    networks:
      - backend
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://127.0.0.1:5000/health || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 3

  dashboard:
    image: ghcr.io/straightchlorine/honeywatch/dashboard:latest
    build: ./dashboard
    container_name: honeywatch-dashboard
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    networks:
      - backend
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.25"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  grafana:
    image: grafana/grafana:11.5.2
    container_name: honeywatch-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_AUTH_ANONYMOUS_ENABLED: "false"
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./grafana/datasources:/etc/grafana/provisioning/datasources:ro
    networks:
      - backend
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://127.0.0.1:3000/api/health || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 3

volumes:
  cowrie-logs:
  postgres-data:
  grafana-data:

networks:
  honeypot:
    driver: bridge
    internal: false  # cowrie needs inbound from the internet
  backend:
    driver: bridge
    internal: true   # no internet access - management plane only
  expose:
    driver: bridge
    internal: false  # only proxy uses this - for host port binding
