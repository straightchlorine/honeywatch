services:
  cowrie:
    image: cowrie/cowrie:latest
    container_name: honeywatch-cowrie
    restart: unless-stopped
    ports:
      - "2222:2222"
    volumes:
      - cowrie-logs:/cowrie/cowrie-git/var/log/cowrie
      - ./cowrie/cowrie.cfg:/cowrie/cowrie-git/etc/cowrie.cfg:ro
    networks:
      - honeywatch

  postgres:
    image: postgres:16-alpine
    container_name: honeywatch-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - honeywatch

  ingestor:
    build: ./ingestor
    container_name: honeywatch-ingestor
    restart: unless-stopped
    depends_on:
      - postgres
      - cowrie
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_HOST: postgres
    volumes:
      - cowrie-logs:/logs:ro
    networks:
      - honeywatch

  api:
    build: ./api
    container_name: honeywatch-api
    restart: unless-stopped
    ports:
      - "5000:5000"
    depends_on:
      - postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_HOST: postgres
      FLASK_SECRET_KEY: ${FLASK_SECRET_KEY}
      DASHBOARD_USER: ${DASHBOARD_USER}
      DASHBOARD_PASSWORD: ${DASHBOARD_PASSWORD}
      MAXMIND_LICENSE_KEY: ${MAXMIND_LICENSE_KEY}
    networks:
      - honeywatch

  dashboard:
    build: ./dashboard
    container_name: honeywatch-dashboard
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      - api
    networks:
      - honeywatch

  grafana:
    image: grafana/grafana:latest
    container_name: honeywatch-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./grafana/datasources:/etc/grafana/provisioning/datasources:ro
    networks:
      - honeywatch

volumes:
  cowrie-logs:
  postgres-data:
  grafana-data:

networks:
  honeywatch:
    driver: bridge
