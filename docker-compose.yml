services:
  # -- Honeypot (isolated network - no access to backend services) --
  cowrie:
    image: cowrie/cowrie:latest
    container_name: honeywatch-cowrie
    restart: unless-stopped
    ports:
      - "2222:2222"
    volumes:
      - cowrie-logs:/cowrie/cowrie-git/var/log/cowrie
      - ./cowrie/cowrie.cfg:/cowrie/cowrie-git/etc/cowrie.cfg:ro
    networks:
      - honeypot
    read_only: true
    tmpfs:
      - /tmp
      - /cowrie/cowrie-git/var/lib/cowrie
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true

  # -- Backend services (localhost-only, not exposed to the internet) --
  postgres:
    image: postgres:16-alpine
    container_name: honeywatch-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - backend

  ingestor:
    build: ./ingestor
    container_name: honeywatch-ingestor
    restart: unless-stopped
    depends_on:
      - postgres
      - cowrie
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_HOST: postgres
    volumes:
      - cowrie-logs:/logs:ro
    networks:
      - backend

  api:
    build: ./api
    container_name: honeywatch-api
    restart: unless-stopped
    ports:
      - "127.0.0.1:5000:5000"
    depends_on:
      - postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_HOST: postgres
      FLASK_SECRET_KEY: ${FLASK_SECRET_KEY}
      DASHBOARD_USER: ${DASHBOARD_USER}
      DASHBOARD_PASSWORD: ${DASHBOARD_PASSWORD}
      MAXMIND_LICENSE_KEY: ${MAXMIND_LICENSE_KEY}
    networks:
      - backend

  dashboard:
    build: ./dashboard
    container_name: honeywatch-dashboard
    restart: unless-stopped
    ports:
      - "127.0.0.1:8080:80"
    depends_on:
      - api
    networks:
      - backend

  grafana:
    image: grafana/grafana:latest
    container_name: honeywatch-grafana
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:3000"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./grafana/datasources:/etc/grafana/provisioning/datasources:ro
    networks:
      - backend

volumes:
  cowrie-logs:
  postgres-data:
  grafana-data:

networks:
  honeypot:
    driver: bridge
    internal: false  # cowrie needs inbound from the internet
  backend:
    driver: bridge
    internal: true   # no internet access - management plane only
